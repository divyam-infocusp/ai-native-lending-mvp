server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: serve index.html for any unmatched route (client-side routing).
  location / {
    try_files $uri /index.html;
  }

  # The app shell must never be cached, or a redeploy can leave a browser pinned
  # to a stale index.html referencing an old (deleted) JS bundle — which is how a
  # post-15c page kept showing the pre-15c "Actions" placeholder. The hashed files
  # under /assets are immutable and safe to cache long-term.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires -1;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Proxy API calls to the backend service (trailing slash strips the /api prefix).
  location /api/ {
    proxy_pass http://api:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
