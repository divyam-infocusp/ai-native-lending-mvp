server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: serve index.html for any unmatched route (client-side routing).
  location / {
    try_files $uri /index.html;
  }

  # Proxy API calls to the backend service (trailing slash strips the /api prefix).
  location /api/ {
    proxy_pass http://api:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
